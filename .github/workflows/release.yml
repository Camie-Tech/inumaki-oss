name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark this GitHub Release as a prerelease"
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*.*.*"

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Set up whisper.cpp (binary + ggml model)
        run: pnpm setup:whisper
      - name: Rebuild native modules against Electron
        run: pnpm --filter @inumaki/desktop exec electron-builder install-app-deps
      - run: pnpm --filter @inumaki/desktop dist:win
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: inumaki-ai-windows-${{ env.RELEASE_TAG }}
          path: apps/desktop/release/**
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Inumaki AI ${{ env.RELEASE_TAG }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: apps/desktop/release/**
